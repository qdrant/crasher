name: Crash

on:
  push:
    branches: [ "*" ]
  schedule:
    # every day at 12 CET
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      qdrant_version:
        description: "Version of qdrant to checkout (tags/v1.6.1, <commit-id>, my-branch)"
        default: dev
      crashing_time:
        description: "Duration in seconds, default is 3600s (1h)"
        default: 3600
      crash_probability:
        description: "Probability to crash, default is 0.3 (30%)"
        default: 0.3
      points_count:
        description: "Number of points to insert"
        default: 5000

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - name: Process inputs
        id: default_inputs
        run: |
          qdrant_version="${{ inputs.qdrant_version }}"
          if [ -z "$qdrant_version" ]; then
            qdrant_version=dev
          fi

          crashing_time="${{ inputs.crashing_time }}"
          if [ -z "$crashing_time" ]; then
            crashing_time=3600
          fi

          crash_probability="${{ inputs.crash_probability }}"
          if [ -z "$crash_probability" ]; then
            crash_probability=0.3
          fi

          points_count="${{ inputs.points_count }}"
          if [ -z "$points_count" ]; then
            points_count=5000
          fi

          # Safety-net timeout for the crashing step: crashing_time (seconds) -> minutes
          # plus a 30 min buffer. GitHub expressions can't do arithmetic, so compute here.
          timeout_minutes=$(( crashing_time / 60 + 30 ))

          echo "qdrant_version=$qdrant_version" >> $GITHUB_OUTPUT
          echo "crashing_time=$crashing_time" >> $GITHUB_OUTPUT
          echo "crash_probability=$crash_probability" >> $GITHUB_OUTPUT
          echo "points_count=$points_count" >> $GITHUB_OUTPUT
          echo "timeout_minutes=$timeout_minutes" >> $GITHUB_OUTPUT
      - name: Install minimal stable
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install mold
        uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1
      - name: Install Protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      # checkout crasher
      - name: Checkout Crasher
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # checkout qdrant dev
      - name: Checkout Qdrant
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: qdrant/qdrant
          ref: ${{ steps.default_inputs.outputs.qdrant_version }}
          path: ./qdrant-src
      # Write the mold linker config AFTER the crasher checkout: actions/checkout
      # defaults to clean=true (git clean -ffdx) and would otherwise wipe .cargo/.
      # Both builds pick it up since qdrant-src is a subdir of the workspace root.
      - name: Enable mold
        shell: bash
        run: |
          # Use the default cc (gcc) driver with the -fuse-ld=mold keyword.
          # gcc >= 12.1 (ubuntu-latest is 24.04) supports it, so no clang needed
          # (clang would pull in a lot of LLVM and eat the disk we're saving).
          mkdir -p .cargo
          echo "[target.x86_64-unknown-linux-gnu]" >> .cargo/config.toml
          echo "rustflags = [\"-C\", \"link-arg=-fuse-ld=mold\"]" >> .cargo/config.toml
      - name: Build Crasher (release)
        run: cargo build --release
      - name: Build Qdrant (debug)
        working-directory: /home/runner/work/crasher/crasher/qdrant-src
        # disable deadlock detector until we sort out https://github.com/Amanieu/parking_lot/issues/489
        # run: cargo build --features "service_debug"
        run: cargo build
      - name: Crash things
        working-directory: /home/runner/work/crasher/crasher
        shell: bash
        # Safety net: a hung/orphaned process must never burn the full 6h default.
        # Derived from the dynamic crashing_time input (see "Process inputs").
        timeout-minutes: ${{ fromJSON(steps.default_inputs.outputs.timeout_minutes) }}
        run: |
          mkdir qdrant
          cp -r qdrant-src/config qdrant

          crashing_time="${{ steps.default_inputs.outputs.crashing_time }}"
          crash_probability="${{ steps.default_inputs.outputs.crash_probability }}"
          points_count="${{ steps.default_inputs.outputs.points_count }}"
          backup_storage_dir="${{ format('{0}/qdrant/storage-backup', github.workspace) }}"

          ./crash-things.sh qdrant ../qdrant-src/target/debug/qdrant "$crash_probability" "$crashing_time" "$points_count" "$backup_storage_dir"
      - name: Upload logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: logs
          retention-days: 90 # default max value
          path: |
            crasher.log
            qdrant.log
      - name: Archive Qdrant workdir (sparse-aware)
        if: failure() || cancelled()
        run: |
          if [ -d qdrant/storage-backup ]; then
            tar --sparse -cf qdrant-workdir.tar qdrant/config qdrant/storage-backup
          else
            echo "No storage-backup present (no crash cycle occurred); archiving live storage instead"
            tar --sparse -cf qdrant-workdir.tar qdrant/config qdrant/storage
          fi
      - name: Upload Qdrant workdir on failure
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure() || cancelled()
        with:
          name: qdrant-workdir
          retention-days: 10
          path: qdrant-workdir.tar
      - name: Send Notification
        if: failure() || cancelled()
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          webhook: ${{ secrets.CRASHER_CHANNEL_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Crasher run status: ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Something is wrong.\nView the results <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|here>"
                  }
                }
              ]
            }
